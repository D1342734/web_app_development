<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | 極簡智慧任務管理系統</title>
    <!-- Google Fonts: Outfit & Noto Sans TC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS (提供基礎 Layout & Utility) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 自訂極致美學 CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- 霓虹背景發光點 -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <!-- 頂部導覽列 -->
    <nav class="navbar navbar-expand-lg navbar-dark main-navbar">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="{{ url_for('main.index') }}">
                <div class="brand-icon me-2">
                    <i class="fa-solid fa-square-check"></i>
                </div>
                <span class="brand-text">Task<span>Flow</span></span>
            </a>
            <div class="ms-auto d-flex align-items-center">
                <span class="text-white-50 small d-none d-sm-inline me-3">讓混亂的思緒變得井然有序</span>
                <a href="https://github.com/D1342734/web_app_development" target="_blank" class="github-link" title="GitHub Repository">
                    <i class="fa-brands fa-github"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- 主內容區 -->
    <main class="container my-5 py-2">
        <!-- 顯示 Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages-container">
                    {% for category, message in messages %}
                        <div class="alert alert-dismissible fade show custom-alert {% if category == 'error' %}alert-danger{% else %}alert-success{% endif %}" role="alert">
                            <div class="d-flex align-items-center">
                                <i class="fa-solid {% if category == 'error' %}fa-circle-exclamation{% else %}fa-circle-check{% endif %} me-2 fs-5"></i>
                                <span>{{ message }}</span>
                            </div>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <!-- 底部資訊 -->
    <footer class="footer mt-auto py-4 text-center">
        <div class="container">
            <p class="m-0 text-white-30 small">© 2026 TaskFlow. Made with <i class="fa-solid fa-heart text-danger"></i> for productivity.</p>
        </div>
    </footer>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 自訂前端非同步邏輯 JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
